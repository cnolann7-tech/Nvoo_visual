<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nvoo'visual | Photographie Sportive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: black; scroll-behavior: smooth; }
        .border-text { -webkit-text-stroke: 1px white; color: transparent; }
    </style>
</head>
<body class="text-white selection:bg-zinc-700">

    <nav class="fixed w-full z-50 bg-black/80 backdrop-blur-md border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center font-bold text-xl italic">N</div>
                <span class="text-xl font-black tracking-tighter uppercase">Nvoo<span class="text-zinc-500 underline decoration-1 underline-offset-4">'visual</span></span>
            </div>
            <div class="hidden md:flex gap-10 text-sm font-medium uppercase tracking-widest">
                <a href="#home" class="hover:text-zinc-400 transition">Accueil</a>
                <a href="#portfolio" class="hover:text-zinc-400 transition">Portfolio</a>
                <a href="#gear" class="hover:text-zinc-400 transition">Matériel</a>
                <a href="#contact" class="hover:text-zinc-400 transition">Contact</a>
            </div>
        </div>
    </nav>

    <section id="home" class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="image.jpeg" alt="Hero" class="w-full h-full object-cover opacity-40 grayscale brightness-50">
            <div class="absolute inset-0 bg-gradient-to-b from-transparent via-zinc-900 to-black"></div>
        </div>
        
        <div class="relative z-10 text-center px-6">
            <div class="inline-block px-4 py-1 border border-zinc-700 rounded-full text-[10px] tracking-[0.3em] uppercase mb-6 bg-zinc-900/50">
                Photographe Sportif • Depuis 2023
            </div>
            <h1 class="text-5xl md:text-9xl font-black tracking-tighter mb-4 italic uppercase leading-[0.9]">
                Capture <br> <span class="border-text">The Game</span>
            </h1>
            <p class="max-w-xl mx-auto text-zinc-400 text-base md:text-xl font-light mb-10 mt-4 italic">
                L'esthétique "Masterclass" appliquée au sport.
            </p>
            
            <div class="flex flex-col gap-4 max-w-sm mx-auto">
                <a href="#portfolio" class="w-full py-4 bg-white text-black font-bold uppercase tracking-tighter hover:bg-zinc-200 transition-all flex items-center justify-center gap-2 text-sm">
                    Explorer le Portfolio <i data-lucide="chevron-right"></i>
                </a>
                
                <div class="flex gap-2">
                    <a href="https://instagram.com/nvoo_visual" target="_blank" class="flex-1 py-4 border border-zinc-700 font-bold uppercase tracking-tighter hover:bg-white hover:text-black transition-all flex items-center justify-center gap-2 text-xs">
                        <i data-lucide="instagram" class="size-4"></i> Instagram
                    </a>
                    <a href="https://tiktok.com/@nvoo_visual" target="_blank" class="flex-1 py-4 border border-zinc-700 font-bold uppercase tracking-tighter hover:bg-white hover:text-black transition-all flex items-center justify-center gap-2 text-xs">
                        <i data-lucide="video" class="size-4"></i> TikTok
                    </a>
                </div>
            </div>
        </div>
    </section>

    <section id="portfolio" class="py-24 px-6">
        <div class="max-w-7xl mx-auto mb-16">
            <h2 class="text-4xl font-black uppercase italic">Portfolio</h2>
            <div class="w-20 h-1 bg-white mt-4"></div>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-7xl mx-auto">
            <div class="aspect-[3/4] bg-zinc-900 border border-zinc-800 overflow-hidden"><img src="image.jpeg" class="w-full h-full object-cover"></div>
            </div>
    </section>

    <section id="contact" class="py-24 px-6 bg-zinc-950 border-t border-zinc-900">
        <div class="max-w-4xl mx-auto bg-zinc-900 border border-zinc-800 p-8 md:p-12">
            <h2 class="text-3xl font-black italic uppercase mb-8">Me contacter</h2>
            
            <form action="https://formspree.io/f/ID_FORMSPREE" method="POST" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" name="nom" placeholder="Ton nom" required class="bg-black border border-zinc-800 p-4 text-sm outline-none focus:border-white transition">
                    <input type="email" name="email" placeholder="Ton adresse mail" required class="bg-black border border-zinc-800 p-4 text-sm outline-none focus:border-white transition">
                </div>
                <textarea name="demande" placeholder="Ta demande (match, événement...)" rows="5" required class="w-full bg-black border border-zinc-800 p-4 text-sm outline-none focus:border-white transition"></textarea>
                
                <button type="submit" class="w-full bg-white text-black font-black uppercase italic py-5 hover:bg-zinc-200 transition-all tracking-widest">
                    Envoyer ma demande
                </button>
            </form>
        </div>
    </section>

    <footer class="py-12 text-center text-zinc-700 text-[10px] font-bold tracking-[0.4em] uppercase">
        Nvoo'visual • 2026
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
